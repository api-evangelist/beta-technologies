aid: beta-technologies
name: BETA Technologies
description: >-
  BETA Technologies is a Vermont-based aerospace company that designs and
  manufactures all-electric aircraft and the supporting electric aviation
  charging network. BETA produces two variants of its ALIA platform: ALIA CTOL
  (conventional take-off and landing) and ALIA VTOL (vertical take-off and
  landing), each carrying a pilot plus five passengers or equivalent cargo,
  with demonstrated range of 336 nautical miles and sub-hour recharge. BETA's
  Charge Cube is an interoperable multimodal charger now deployed at sites
  across the U.S. covering more than 50 million people within 50 miles, and
  the company operates a 188,000-square-foot net-zero manufacturing facility
  in South Burlington, Vermont. Customers include UPS, United Therapeutics,
  the U.S. Air Force and U.S. Army (via AFWERX Agility Prime), Air New Zealand,
  Bristow, Surf Air Mobility, and other early operators; BETA was selected for
  seven of the eight FAA eVTOL Integration Pilot Program initiatives.
